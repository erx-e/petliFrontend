@if (percentage != null && !isImgLoaded) {
  <div class="progress-container">
    <h3 class="uploading-title">Subiendo imagen</h3>
    <progress class="progress-bar" [value]="percentage" max="100"></progress>
    <p class="progress-pct">{{ percentage }}%</p>
  </div>
}
@if (errorMessage) {
  <div class="upload-error">
    <p>{{ errorMessage }}</p>
  </div>
}
@if (downloadUrl; as url) {
  <div
    class="img-container"
    [class.is-loaded]="isImgLoaded || imgFailed"
    [class.is-failed]="imgFailed"
    [class.deleting]="isLoading"
  >
    @if (!imgFailed) {
      <a class="img-link" [href]="url" target="_blank" rel="noopener">
        <img
          class="img"
          [src]="url"
          alt="Imagen de la mascota"
          (load)="onLoaded()"
          (error)="onImgError()"
        />
      </a>
    } @else {
      <div class="img-missing" role="img" aria-label="Imagen no disponible">
        <svg class="img-missing__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="9" cy="9" r="2" />
          <path d="m21 15-5-5L5 21" />
        </svg>
        <p class="img-missing__text">Imagen no disponible</p>
      </div>
    }
    @if (!isLoading) {
      <button
        class="delete__button"
        type="button"
        (click)="deleteImg()"
        aria-label="Eliminar imagen"
        >
        <svg
          class="delete__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          aria-hidden="true"
          >
          <line x1="6" y1="6" x2="18" y2="18" />
          <line x1="18" y1="6" x2="6" y2="18" />
        </svg>
      </button>
    } @else {
      <div class="img-deleting" aria-live="polite">
        <span class="img-deleting__spinner" aria-hidden="true"></span>
        <span class="img-deleting__text">Eliminando…</span>
      </div>
    }
  </div>
}
