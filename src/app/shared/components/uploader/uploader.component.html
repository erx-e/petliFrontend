<div
  class="dropzone"
  dropzone
  (hovered)="toggleHover($event)"
  (dropped)="onDrop($event)"
  [class.hovering]="isHovering"
  >
  <h3 class="text title">Arrastra y suelta una o más imagenes</h3>
  <p class="text">o...</p>
  <div class="file">
    <label class="file-label">
      <input
        class="file-input"
        id="inputElement"
        type="file"
        multiple="multiple"
        accept="image/*"
        (change)="onDrop($any($event.target).files)"
        />
        <span>Elige una o más imagenes</span>
      </label>
    </div>
  </div>

  @if (!updating) {
    <div class="uploaded-files">
      @for (file of files; track file) {
        <div class="imgUploaded">
          <app-upload-task
            [published]="published"
            [updating]="false"
            (uploaded)="onUpload($event)"
            (deleted)="onDelete($event)"
            [file]="file"
          ></app-upload-task>
        </div>
      }
    </div>
  } @else {
    <div class="uploaded-files">
      @for (file of files; track file) {
        <div class="imgUploaded">
          <app-upload-task
            [published]="published"
            [updating]="true"
            (uploadedUpdate)="onUpload($event)"
            (deleted)="onDelete($event)"
            [file]="file"
          ></app-upload-task>
        </div>
      }
      @for (img of imgsUrlUpdatingToShow; track img) {
        <div class="imgUploaded">
          @if (img.url) {
            <app-upload-task
              [published]="published"
              [updating]="true"
              (uploadedUpdate)="onUpload($event)"
              (deletedUpdate)="onDelete($event)"
              [imgUpdating]="img"
            ></app-upload-task>
          }
        </div>
      }
    </div>
  }
