<div
  class="dropzone"
  dropzone
  (hovered)="toggleHover($event)"
  (dropped)="onDrop($event)"
  [class.hovering]="isHovering"
  >
  <svg
    class="dropzone__icon"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    aria-hidden="true"
    >
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
    <polyline points="7 9 12 4 17 9" />
    <line x1="12" y1="4" x2="12" y2="16" />
  </svg>
  <h3 class="dropzone__title">Arrastra y suelta tus fotos aquí</h3>
  <p class="dropzone__hint">o</p>
  <div class="file">
    <label class="file-label">
      <input
        class="file-input"
        id="inputElement"
        type="file"
        multiple="multiple"
        accept="image/*"
        (change)="onDrop($any($event.target).files)"
        />
        <span>Elige imágenes</span>
      </label>
    </div>
    <p class="dropzone__meta">PNG o JPG · hasta 4 fotos</p>
  </div>

  @if (!updating) {
    <div class="uploaded-files">
      @for (file of files; track file) {
        <div class="imgUploaded">
          <app-upload-task
            [published]="published"
            [updating]="false"
            (uploaded)="onUpload($event)"
            (deleted)="onDelete($event)"
            [file]="file"
          ></app-upload-task>
        </div>
      }
    </div>
  } @else {
    <div class="uploaded-files">
      @for (file of files; track file) {
        <div class="imgUploaded">
          <app-upload-task
            [published]="published"
            [updating]="true"
            (uploadedUpdate)="onUpload($event)"
            (deleted)="onDelete($event)"
            [file]="file"
          ></app-upload-task>
        </div>
      }
      @for (img of imgsUrlUpdatingToShow; track img) {
        <div class="imgUploaded">
          @if (img.url) {
            <app-upload-task
              [published]="published"
              [updating]="true"
              (uploadedUpdate)="onUpload($event)"
              (deletedUpdate)="onDelete($event)"
              [imgUpdating]="img"
            ></app-upload-task>
          }
        </div>
      }
    </div>
  }
